<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Leo Dispatch">
  <rect x="2" y="2" width="96" height="96" rx="22" fill="#000000" stroke="#f4b400" stroke-width="2.5"/>

  <!-- shipping container, filled for legibility at small sizes -->
  <svg x="13" y="9" width="74" height="60" viewBox="0 0 110 100" overflow="visible">
    <!-- top face -->
    <path d="M38,49 L95,33 L72,24 L15,40 Z" fill="#ffe066"/>
    <!-- long corrugated side -->
    <path d="M38,49 L95,33 L95,69 L38,85 Z" fill="#f4b400"/>
    <g stroke="#1a1300" stroke-width="1.5">
      <line x1="43.7" y1="47.4" x2="43.7" y2="83.4"/>
      <line x1="49.4" y1="45.8" x2="49.4" y2="81.8"/>
      <line x1="55.1" y1="44.2" x2="55.1" y2="80.2"/>
      <line x1="60.8" y1="42.6" x2="60.8" y2="78.6"/>
      <line x1="66.5" y1="41.0" x2="66.5" y2="77.0"/>
      <line x1="72.2" y1="39.4" x2="72.2" y2="75.4"/>
      <line x1="77.9" y1="37.8" x2="77.9" y2="73.8"/>
      <line x1="83.6" y1="36.2" x2="83.6" y2="72.2"/>
      <line x1="89.3" y1="34.6" x2="89.3" y2="70.6"/>
    </g>
    <!-- door end -->
    <path d="M38,49 L15,40 L15,76 L38,85 Z" fill="#ffc720"/>
    <g stroke="#1a1300" stroke-width="2" stroke-linecap="round">
      <line x1="26.5" y1="44.5" x2="26.5" y2="80.5"/>
      <line x1="20.5" y1="63" x2="24" y2="63"/>
      <line x1="29" y1="63" x2="32.5" y2="63"/>
    </g>
  </svg>

  <text x="50" y="88" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
        font-weight="900" font-size="16" letter-spacing="0.5" fill="#f4b400"
        textLength="80" lengthAdjust="spacingAndGlyphs">DISPATCH</text>
</svg>
